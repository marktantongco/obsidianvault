name: Edge Wiki Sync & Daily Update

on:
  schedule:
    - cron: '0 1 * * *' # Run daily at 1:00 AM UTC (9:00 AM Asia/Manila)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  daily-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for correct git modified times

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Daily Update Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python .github/scripts/daily_update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "edge-syncer"
          git config --global user.email "edge-syncer@cloudflare.local"
          git add index.md hot.md log.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "[edge-sync] $(date +'%Y-%m-%d %H:%M') Auto-regenerate index & hot.md" && git push origin master)
